services:
  server:
    build: ./ai-realtime
    ports:
      - "8000:8000"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  web:
    build: ./ux-web
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      server:
        condition: service_healthy
